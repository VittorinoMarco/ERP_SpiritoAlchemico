# Configurazione Nginx per spiritoalchemico.marcovittorino.com
# Sostituisce il proxy Node (porta 3000) con file statici da /var/www/erp/
#
# Per applicare:
# 1. ssh root@87.106.39.127
# 2. sudo nano /etc/nginx/sites-available/default
#    (oppure crea un file dedicato in sites-available e symlink in sites-enabled)
# 3. Sostituisci il server block di spiritoalchemico con questo
# 4. sudo nginx -t && sudo systemctl reload nginx

server {
    server_name spiritoalchemico.marcovittorino.com;
    client_max_body_size 10M;

    # Root: file statici SvelteKit (adapter-static)
    root /var/www/erp;

    # API e Admin PocketBase
    location /api/ {
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        proxy_read_timeout 360s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:8090;
    }

    location /_/ {
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        proxy_read_timeout 360s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:8090;
    }

    # Moduli .mjs (es. pdf.worker): MIME corretto (default nginx = octet-stream → worker PDF.js fallisce)
    location ~* ^/_app/.+\.mjs$ {
        root /var/www/erp;
        types { }
        default_type application/javascript;
        charset utf-8;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Asset statici (CSS, JS) - cache lunga
    location /_app/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Frontend SPA: file statici + fallback index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/spiritoalchemico.marcovittorino.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/spiritoalchemico.marcovittorino.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}
